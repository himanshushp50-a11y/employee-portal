services:
  - type: web
    name: employee-portal-backend
    env: python
    path: backend
    plan: starter
    region: oregon
    buildCommand: cd backend && uv sync
    startCommand: cd backend && uv run -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: '["https://your-frontend-domain","http://localhost:3000"]'
      - key: DATABASE_URL
        fromDatabase:
          name: kuberya-attendance-db
          property: connectionString

databases:
  - name: kuberya-attendance-db
    plan: starter
