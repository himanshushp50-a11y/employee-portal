services:
  - type: web
    name: employee-portal-backend
    env: python
    plan: starter
    region: oregon
    buildCommand: uv sync
    startCommand: cd backend && uv run python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: '["https://employee-portal-taupe.vercel.app","http://localhost:3000","http://localhost:5173"]'
      - key: DATABASE_URL
        fromDatabase:
          name: kuberya-attendance-db
          property: connectionString

databases:
  - name: kuberya-attendance-db
    plan: starter
